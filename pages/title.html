<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planet Defender – Title</title>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/reset.css"/>
  <link rel="stylesheet" href="../css/buttons.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/titlescreen.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="page-title">

  <!-- Animated star field canvas -->
  <canvas id="title-stars-canvas"></canvas>

  <!-- Planet animation -->
  <div class="title-planet-orbit" id="title-planet-orbit">
    <canvas id="title-planet-canvas" width="260" height="260"></canvas>
    <div class="planet-ring-outer"></div>
    <div class="title-moon" id="title-moon"></div>
    <!-- Asteroid belt decoration -->
    <div class="title-asteroid-belt" id="title-asteroid-belt">
      <span class="t-ast t-ast-1">🪨</span>
      <span class="t-ast t-ast-2">🪨</span>
      <span class="t-ast t-ast-3">☄️</span>
      <span class="t-ast t-ast-4">🪨</span>
      <span class="t-ast t-ast-5">☄️</span>
    </div>
  </div>

  <!-- Main content -->
  <main class="title-content" id="title-content">

    <div class="title-badge">COSMIC DEFENSE</div>

    <h1 class="game-title" id="game-title">
      <span class="title-word t-planet" data-text="PLANET">PLANET</span>
      <span class="title-word t-defender" data-text="DEFENDER">DEFENDER</span>
    </h1>

    <p class="game-tagline">
      Protect your world from the endless asteroid storm
    </p>

    <!-- Save info -->
    <div class="save-info-row" id="save-info-row">
      <div class="save-chip">
        <span class="coin-icon-sm">🪙</span>
        <span id="title-coin-count">0</span> coins
      </div>
      <div class="save-chip">
        <span>🏆</span>
        <span id="title-highscore">0</span> best
      </div>
      <div class="save-chip">
        <span>🌊</span>
        Wave <span id="title-max-wave">0</span> reached
      </div>
    </div>

    <!-- Action buttons -->
    <nav class="title-buttons" id="title-buttons">
      <button class="btn btn-primary btn-glow btn-xl" id="btn-play" autofocus>
        <span class="btn-icon">▶</span>
        BEGIN MISSION
      </button>
      <button class="btn btn-outline btn-lg" id="btn-continue" style="display:none">
        <span class="btn-icon">⏩</span>
        CONTINUE
      </button>
      <div class="btn-row">
        <button class="btn btn-outline btn-md" id="btn-tutorial">📖 HOW TO PLAY</button>
        <button class="btn btn-outline btn-md" id="btn-shop">🛒 SHOP</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline btn-md" id="btn-achievements">🏅 ACHIEVEMENTS</button>
        <button class="btn btn-outline btn-md" id="btn-leaderboard">🏆 SCORES</button>
      </div>
      <button class="btn btn-ghost btn-sm" id="btn-settings">⚙ SETTINGS</button>
    </nav>

    <!-- Controls hint -->
    <div class="title-controls-hint">
      <div class="controls-row">
        <kbd class="key-icon">🖱️</kbd>
        <span>AIM + CLICK TO SHOOT</span>
      </div>
      <div class="controls-row">
        <kbd class="key-icon">1–5</kbd>
        <span>ACTIVATE POWERUPS</span>
      </div>
      <div class="controls-row">
        <kbd class="key-icon">S</kbd>
        <span>OPEN SHOP</span>
      </div>
      <div class="controls-row">
        <kbd class="key-icon">P</kbd>
        <span>PAUSE</span>
      </div>
    </div>

    <footer class="title-footer">
      <span>v2.0</span>
      <span>·</span>
      <span>PLANET DEFENDER</span>
      <span>·</span>
      <span>PROTECT YOUR WORLD</span>
    </footer>
  </main>

  <!-- Scroll of floating asteroids in background -->
  <div class="bg-asteroid-scroll" id="bg-asteroid-scroll" aria-hidden="true"></div>

  <script src="../js/utils/MathUtils.js"></script>
  <script src="../js/utils/SaveManager.js"></script>
  <script src="../js/utils/RNG.js"></script>
  <script>
    /**
     * TitlePage controller – runs entirely within pages/title.html
     * Communicates back to the parent window via postMessage.
     */
    class TitlePage {
      constructor() {
        this.save      = new SaveManager('planetDefender');
        this.rng       = new RNG();
        this.starsCtx  = null;
        this.planetCtx = null;
        this.animFrame = null;
        this.tick      = 0;
        this.moonAngle = 0;
        this.stars     = [];
        this.shootingStars = [];
        this.bgAsteroids   = [];
        this.planetLandPolys = [];
        this.cloudAngles   = [];
        this.init();
      }

      init() {
        this.setupStarCanvas();
        this.setupPlanetCanvas();
        this.buildStars(280);
        this.buildPlanetLand();
        this.buildBgAsteroids();
        this.loadSaveData();
        this.bindButtons();
        this.animate();
        this.spawnShootingStarTimer();
        setTimeout(() => this.revealContent(), 120);
      }

      /* ── Save data ── */
      loadSaveData() {
        const coins   = this.save.getCoins();
        const best    = this.save.getBestScore();
        const maxWave = this.save.getMaxWave();
        document.getElementById('title-coin-count').textContent = coins.toLocaleString();
        document.getElementById('title-highscore').textContent  = best.toLocaleString();
        document.getElementById('title-max-wave').textContent   = maxWave;
        const cont = document.getElementById('btn-continue');
        if (this.save.hasSave()) {
          cont.style.display = 'inline-flex';
        }
      }

      /* ── Button bindings ── */
      bindButtons() {
        document.getElementById('btn-play').addEventListener('click', () => {
          this.send('navigate', 'game');
        });
        const cont = document.getElementById('btn-continue');
        if (cont) {
          cont.addEventListener('click', () => this.send('navigate', 'continue'));
        }
        document.getElementById('btn-tutorial').addEventListener('click', () => {
          this.send('navigate', 'tutorial');
        });
        document.getElementById('btn-shop').addEventListener('click', () => {
          this.send('navigate', 'shop');
        });
        document.getElementById('btn-achievements').addEventListener('click', () => {
          this.send('navigate', 'achievements');
        });
        document.getElementById('btn-leaderboard').addEventListener('click', () => {
          this.send('navigate', 'leaderboard');
        });
        document.getElementById('btn-settings').addEventListener('click', () => {
          this.send('navigate', 'settings');
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
          const k = e.key.toUpperCase();
          if (k === 'ENTER' || k === ' ') {
            document.getElementById('btn-play').click();
          } else if (k === 'T') {
            document.getElementById('btn-tutorial').click();
          } else if (k === 'S') {
            document.getElementById('btn-shop').click();
          } else if (k === 'H') {
            document.getElementById('btn-leaderboard').click();
          }
        });
      }

      send(type, payload) {
        if (window.parent !== window) {
          window.parent.postMessage({ type, data: payload }, '*');
        } else {
          // standalone: redirect to index.html with hash
          window.location.href = `../index.html#${payload}`;
        }
      }

      /* ── Stars canvas ── */
      setupStarCanvas() {
        const cvs = document.getElementById('title-stars-canvas');
        cvs.width  = window.innerWidth;
        cvs.height = window.innerHeight;
        this.starsCtx = cvs.getContext('2d');
        window.addEventListener('resize', () => {
          cvs.width  = window.innerWidth;
          cvs.height = window.innerHeight;
          this.buildStars(280);
        });
      }

      buildStars(count) {
        this.stars = [];
        const w = window.innerWidth, h = window.innerHeight;
        for (let i = 0; i < count; i++) {
          this.stars.push({
            x:    this.rng.between(0, w),
            y:    this.rng.between(0, h),
            r:    this.rng.between(0.3, 1.8),
            base: this.rng.between(0.2, 1.0),
            spd:  this.rng.between(0.3, 1.4),
            phase: this.rng.between(0, Math.PI * 2),
            color: this.rng.pick(['#ffffff','#c8e4ff','#ffe8aa','#ffd0d0','#c0f0ff'])
          });
        }
      }

      buildPlanetLand() {
        this.planetLandPolys = [];
        for (let i = 0; i < 6; i++) {
          const cx = 80 + this.rng.between(-30, 60);
          const cy = 80 + this.rng.between(-30, 60);
          const pts = [];
          const numV = 5 + Math.floor(this.rng.between(0, 4));
          for (let v = 0; v < numV; v++) {
            const a = (v / numV) * Math.PI * 2;
            const r = 14 + this.rng.between(-6, 8);
            pts.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r });
          }
          this.planetLandPolys.push(pts);
        }
        this.cloudAngles = [];
        for (let i = 0; i < 4; i++) {
          this.cloudAngles.push({
            a: this.rng.between(0, Math.PI * 2),
            r: 60 + this.rng.between(-15, 15),
            spd: 0.001 + this.rng.between(0, 0.003),
            size: 8 + this.rng.between(0, 16),
          });
        }
      }

      buildBgAsteroids() {
        this.bgAsteroids = [];
        for (let i = 0; i < 12; i++) {
          const h = window.innerHeight;
          this.bgAsteroids.push({
            x: window.innerWidth + this.rng.between(0, 600),
            y: this.rng.between(30, h - 30),
            r: this.rng.between(6, 22),
            spd: this.rng.between(0.3, 1.2),
            rot: this.rng.between(0, Math.PI * 2),
            rotSpd: (this.rng.between(0, 1) > 0.5 ? 1 : -1) * this.rng.between(0.005, 0.025),
            alpha: this.rng.between(0.12, 0.35),
            verts: this.buildAstVerts(6 + Math.floor(this.rng.between(0, 5))),
          });
        }
        // Render bg scroll container with emojis
        const el = document.getElementById('bg-asteroid-scroll');
        if (el) {
          el.innerHTML = '';
          for (let i = 0; i < 8; i++) {
            const span = document.createElement('span');
            span.className = 'bg-ast-emoji';
            span.textContent = this.rng.pick(['🪨','☄️','🪨','🌑','🪨']);
            span.style.cssText = `
              top: ${this.rng.between(5, 90)}%;
              animation-delay: ${-this.rng.between(0, 18)}s;
              animation-duration: ${12 + this.rng.between(0, 12)}s;
              font-size: ${14 + this.rng.between(0, 28)}px;
              opacity: ${0.06 + this.rng.between(0, 0.12)};
            `;
            el.appendChild(span);
          }
        }
      }

      buildAstVerts(n) {
        const v = [];
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2;
          const r = 0.7 + this.rng.between(0, 0.6);
          v.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
        }
        return v;
      }

      spawnShootingStarTimer() {
        const spawn = () => {
          if (this.rng.between(0, 1) < 0.55) {
            this.shootingStars.push({
              x:     this.rng.between(100, window.innerWidth),
              y:     this.rng.between(0, window.innerHeight * 0.5),
              len:   this.rng.between(60, 180),
              spd:   this.rng.between(6, 14),
              alpha: 1,
              angle: Math.PI * 0.15 + this.rng.between(-0.1, 0.1),
            });
          }
          setTimeout(spawn, 1500 + this.rng.between(0, 4000));
        };
        setTimeout(spawn, 2000);
      }

      /* ── Planet canvas ── */
      setupPlanetCanvas() {
        const cvs = document.getElementById('title-planet-canvas');
        this.planetCtx = cvs.getContext('2d');
      }

      drawPlanet(t) {
        const ctx = this.planetCtx;
        const W = 260, H = 260, cx = 130, cy = 130, R = 100;
        ctx.clearRect(0, 0, W, H);

        // Atmosphere glow
        const atmo = ctx.createRadialGradient(cx, cy, R * 0.88, cx, cy, R * 1.28);
        atmo.addColorStop(0, 'rgba(80,180,255,0.18)');
        atmo.addColorStop(1, 'rgba(80,180,255,0)');
        ctx.fillStyle = atmo;
        ctx.beginPath();
        ctx.arc(cx, cy, R * 1.28, 0, Math.PI * 2);
        ctx.fill();

        // Ocean base
        const ocean = ctx.createRadialGradient(cx - 30, cy - 30, 0, cx, cy, R);
        ocean.addColorStop(0, '#5ab0ff');
        ocean.addColorStop(0.5, '#3a80c8');
        ocean.addColorStop(1, '#1a4880');
        ctx.fillStyle = ocean;
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.clip();
        ctx.fillRect(cx - R, cy - R, R * 2, R * 2);

        // Land masses (shift with time for slow rotation illusion)
        const landShift = (t * 0.00018) % (Math.PI * 2);
        ctx.fillStyle = '#2e8a4a';
        for (const poly of this.planetLandPolys) {
          ctx.beginPath();
          const shifted = poly.map(p => {
            const angle = Math.atan2(p.y - cy, p.x - cx) + landShift;
            const dist  = Math.hypot(p.x - cx, p.y - cy);
            return { x: cx + Math.cos(angle) * dist, y: cy + Math.sin(angle) * dist };
          });
          ctx.moveTo(shifted[0].x, shifted[0].y);
          for (let i = 1; i < shifted.length; i++) ctx.lineTo(shifted[i].x, shifted[i].y);
          ctx.closePath();
          ctx.fill();
        }

        // Polar ice cap
        ctx.fillStyle = 'rgba(220,240,255,0.7)';
        ctx.beginPath();
        ctx.arc(cx, cy - R + 10, 22, 0, Math.PI * 2);
        ctx.fill();

        // Clouds
        ctx.fillStyle = 'rgba(255,255,255,0.20)';
        for (const c of this.cloudAngles) {
          c.a += c.spd;
          const cx2 = cx + Math.cos(c.a) * c.r;
          const cy2 = cy + Math.sin(c.a) * c.r * 0.55;
          ctx.beginPath();
          ctx.ellipse(cx2, cy2, c.size, c.size * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        // Specular highlight
        const spec = ctx.createRadialGradient(cx - 28, cy - 28, 0, cx, cy, R);
        spec.addColorStop(0, 'rgba(255,255,255,0.28)');
        spec.addColorStop(0.4, 'rgba(255,255,255,0.06)');
        spec.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = spec;
        ctx.fillRect(cx - R, cy - R, R * 2, R * 2);

        ctx.restore();

        // Shadow (night side)
        const shadow = ctx.createRadialGradient(cx + 55, cy, 0, cx + 55, cy, R * 1.2);
        shadow.addColorStop(0, 'rgba(0,0,20,0.55)');
        shadow.addColorStop(0.5, 'rgba(0,0,20,0.22)');
        shadow.addColorStop(1, 'rgba(0,0,20,0)');
        ctx.fillStyle = shadow;
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.clip();
        ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
        ctx.restore();

        // Border glow
        ctx.strokeStyle = 'rgba(80,180,255,0.35)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.stroke();
      }

      /* ── Stars canvas draw ── */
      drawStars(t) {
        const ctx = this.starsCtx;
        const w = ctx.canvas.width, h = ctx.canvas.height;
        ctx.clearRect(0, 0, w, h);

        // Nebula background
        const neb = ctx.createRadialGradient(w * 0.3, h * 0.4, 0, w * 0.5, h * 0.5, w * 0.7);
        neb.addColorStop(0, 'rgba(20,10,60,0.3)');
        neb.addColorStop(0.5, 'rgba(5,5,30,0.15)');
        neb.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = neb;
        ctx.fillRect(0, 0, w, h);

        // Stars twinkle
        for (const s of this.stars) {
          const alpha = s.base + Math.sin(t * 0.001 * s.spd + s.phase) * (1 - s.base) * 0.6;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        }

        // Shooting stars
        for (let i = this.shootingStars.length - 1; i >= 0; i--) {
          const ss = this.shootingStars[i];
          ctx.globalAlpha = ss.alpha;
          const grd = ctx.createLinearGradient(
            ss.x, ss.y,
            ss.x - Math.cos(ss.angle) * ss.len,
            ss.y - Math.sin(ss.angle) * ss.len
          );
          grd.addColorStop(0, 'rgba(255,255,255,0.9)');
          grd.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.strokeStyle = grd;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(ss.x, ss.y);
          ctx.lineTo(ss.x - Math.cos(ss.angle) * ss.len, ss.y - Math.sin(ss.angle) * ss.len);
          ctx.stroke();
          ss.x -= Math.cos(ss.angle) * ss.spd;
          ss.y += Math.sin(ss.angle) * ss.spd;
          ss.alpha -= 0.012;
          if (ss.alpha <= 0) this.shootingStars.splice(i, 1);
        }

        ctx.globalAlpha = 1;
      }

      /* ── Moon orbit ── */
      updateMoon(t) {
        this.moonAngle = t * 0.0006;
        const el = document.getElementById('title-moon');
        if (!el) return;
        const r = 148, cx = 130, cy = 130;
        const mx = cx + Math.cos(this.moonAngle) * r;
        const my = cy + Math.sin(this.moonAngle) * r * 0.38;
        el.style.transform = `translate(${mx - 8}px, ${my - 8}px)`;
      }

      /* ── Reveal animation ── */
      revealContent() {
        const el = document.getElementById('title-content');
        if (el) el.classList.add('revealed');
        const orbit = document.getElementById('title-planet-orbit');
        if (orbit) orbit.classList.add('revealed');
      }

      /* ── Main loop ── */
      animate(t = 0) {
        this.tick = t;
        this.drawStars(t);
        this.drawPlanet(t);
        this.updateMoon(t);
        this.animFrame = requestAnimationFrame(ts => this.animate(ts));
      }

      destroy() {
        if (this.animFrame) cancelAnimationFrame(this.animFrame);
      }
    }

    // Boot
    window.addEventListener('DOMContentLoaded', () => {
      window._titlePage = new TitlePage();
    });
  </script>
</body>
</html>

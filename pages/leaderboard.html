<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planet Defender – Leaderboard</title>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/reset.css"/>
  <link rel="stylesheet" href="../css/buttons.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/leaderboard-screen.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="page-leaderboard">

  <canvas id="lb-bg-canvas"></canvas>

  <div class="lb-wrapper">
    <header class="lb-header">
      <button class="btn btn-ghost" id="btn-back">← BACK</button>
      <div class="lb-title-block">
        <h1 class="lb-title">🏆 LEADERBOARD</h1>
        <p class="lb-sub">Your local hall of fame</p>
      </div>
      <div class="lb-best-chip">
        <span class="lb-best-label">CURRENT BEST</span>
        <span class="lb-best-val" id="lb-global-best">0</span>
      </div>
    </header>

    <nav class="lb-tabs">
      <button class="lb-tab active" data-tab="alltime">ALL TIME</button>
      <button class="lb-tab" data-tab="today">TODAY</button>
      <button class="lb-tab" data-tab="waves">BY WAVE</button>
    </nav>

    <div class="lb-body">
      <!-- Top 3 podium -->
      <div class="lb-podium" id="lb-podium">
        <!-- injected -->
      </div>
      <!-- Full list -->
      <div class="lb-list" id="lb-list">
        <!-- injected -->
      </div>
      <div class="lb-empty hidden" id="lb-empty">
        <span>🎮</span>
        <p>No scores yet — play a game!</p>
      </div>
    </div>

    <div class="lb-actions">
      <button class="btn btn-ghost btn-sm" id="btn-clear">🗑 Clear Scores</button>
    </div>
  </div>

  <div class="confirm-modal hidden" id="confirm-modal">
    <div class="confirm-box">
      <p>Clear all local scores?</p>
      <div class="confirm-btns">
        <button class="btn btn-primary" id="btn-confirm-yes">YES</button>
        <button class="btn btn-ghost" id="btn-confirm-no">NO</button>
      </div>
    </div>
  </div>

  <script src="../js/utils/MathUtils.js"></script>
  <script src="../js/utils/RNG.js"></script>
  <script src="../js/utils/SaveManager.js"></script>
  <script>
    class LeaderboardPage {
      constructor() {
        this.save = new SaveManager('planetDefender');
        this.rng  = new RNG();
        this.ctx  = null;
        this.stars = [];
        this.activeTab = 'alltime';
        this.init();
      }

      init() {
        this.setupBgCanvas();
        this.buildStars(180);
        this.loadBestDisplay();
        this.bindTabs();
        this.bindButtons();
        this.renderTab('alltime');
        this.animateBg();
      }

      loadBestDisplay() {
        const best = this.save.getBestScore();
        document.getElementById('lb-global-best').textContent = best.toLocaleString();
      }

      bindTabs() {
        document.querySelectorAll('.lb-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            this.activeTab = tab.dataset.tab;
            this.renderTab(this.activeTab);
          });
        });
      }

      renderTab(tab) {
        let entries = this.save.getLeaderboard();
        if (tab === 'today') {
          const todayStart = new Date(); todayStart.setHours(0,0,0,0);
          entries = entries.filter(e => e.date >= todayStart.getTime());
        } else if (tab === 'waves') {
          entries = [...entries].sort((a, b) => (b.wave||0) - (a.wave||0));
        } else {
          entries = [...entries].sort((a, b) => b.score - a.score);
        }
        entries = entries.slice(0, 20);
        this.renderPodium(entries.slice(0, 3));
        this.renderList(entries, tab);
        const empty = document.getElementById('lb-empty');
        empty.classList.toggle('hidden', entries.length > 0);
      }

      renderPodium(top3) {
        const podium = document.getElementById('lb-podium');
        if (!top3.length) { podium.innerHTML = ''; return; }
        const medals = ['🥇', '🥈', '🥉'];
        const heights = ['80px', '60px', '40px'];
        const order   = [1, 0, 2]; // visual order: 2nd, 1st, 3rd
        podium.innerHTML = `
          <div class="podium-row">
            ${order.map(i => {
              if (!top3[i]) return '<div class="podium-slot empty"></div>';
              const e = top3[i];
              const dt = new Date(e.date);
              const dateStr = `${dt.getMonth()+1}/${dt.getDate()}`;
              return `
                <div class="podium-slot rank-${i+1}">
                  <div class="podium-medal">${medals[i]}</div>
                  <div class="podium-score">${e.score.toLocaleString()}</div>
                  <div class="podium-wave">Wave ${e.wave||1}</div>
                  <div class="podium-date">${dateStr}</div>
                  <div class="podium-base" style="height:${heights[i]}"></div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      renderList(entries, tab) {
        const list = document.getElementById('lb-list');
        if (!entries.length) { list.innerHTML = ''; return; }
        const ranks = ['🥇','🥈','🥉','4','5','6','7','8','9','10'];
        const rows  = entries.map((e, i) => {
          const dt  = new Date(e.date);
          const dateStr = dt.toLocaleDateString();
          const primary = tab === 'waves'
            ? `Wave ${e.wave||1}`
            : e.score.toLocaleString();
          const secondary = tab === 'waves'
            ? e.score.toLocaleString()
            : `Wave ${e.wave||1}`;
          const isPersonalBest = i === 0;
          return `
            <div class="lb-row ${isPersonalBest && tab==='alltime' ? 'lb-row-best' : ''}">
              <span class="lb-rank">${ranks[i] || (i+1)}</span>
              <span class="lb-primary">${primary}</span>
              <span class="lb-secondary">${secondary}</span>
              <span class="lb-date">${dateStr}</span>
            </div>
          `;
        });
        list.innerHTML = rows.join('');
      }

      bindButtons() {
        document.getElementById('btn-back').addEventListener('click', () => {
          this.send('navigate', 'back');
        });
        document.getElementById('btn-clear').addEventListener('click', () => {
          document.getElementById('confirm-modal').classList.remove('hidden');
        });
        document.getElementById('btn-confirm-yes').addEventListener('click', () => {
          this.save.clearLeaderboard();
          document.getElementById('confirm-modal').classList.add('hidden');
          this.renderTab(this.activeTab);
        });
        document.getElementById('btn-confirm-no').addEventListener('click', () => {
          document.getElementById('confirm-modal').classList.add('hidden');
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') this.send('navigate', 'back');
        });
      }

      send(type, payload) {
        if (window.parent !== window) {
          window.parent.postMessage({ type, data: payload }, '*');
        }
      }

      setupBgCanvas() {
        const cvs = document.getElementById('lb-bg-canvas');
        cvs.width  = window.innerWidth;
        cvs.height = window.innerHeight;
        this.ctx   = cvs.getContext('2d');
        window.addEventListener('resize', () => {
          cvs.width  = window.innerWidth;
          cvs.height = window.innerHeight;
        });
      }

      buildStars(n) {
        this.stars = [];
        const w = window.innerWidth, h = window.innerHeight;
        for (let i = 0; i < n; i++) {
          this.stars.push({
            x: Math.random() * w, y: Math.random() * h,
            r: 0.4 + Math.random() * 1.3,
            alpha: 0.15 + Math.random() * 0.5,
            phase: Math.random() * Math.PI * 2,
            spd: 0.3 + Math.random() * 0.8,
          });
        }
      }

      animateBg(t = 0) {
        const ctx = this.ctx;
        const w = ctx.canvas.width, h = ctx.canvas.height;
        ctx.clearRect(0, 0, w, h);
        for (const s of this.stars) {
          const a = s.alpha * (0.5 + 0.5 * Math.sin(t * 0.001 * s.spd + s.phase));
          ctx.globalAlpha = a;
          ctx.fillStyle = '#c8e4ff';
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(ts => this.animateBg(ts));
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      window._lbPage = new LeaderboardPage();
    });
  </script>
</body>
</html>

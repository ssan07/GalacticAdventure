<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planet Defender – Shop</title>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/reset.css"/>
  <link rel="stylesheet" href="../css/buttons.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/shop-screen.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="page-shop">

  <!-- Starfield BG -->
  <canvas id="shop-bg-canvas"></canvas>

  <div class="shop-wrapper">

    <!-- Header -->
    <header class="shop-header">
      <button class="btn btn-ghost btn-back" id="btn-back">← BACK</button>
      <div class="shop-title-block">
        <h1 class="shop-title">COSMIC SHOP</h1>
        <p class="shop-sub">Spend your hard-earned asteroid coins</p>
      </div>
      <div class="shop-balance-block">
        <span class="balance-label">YOUR BALANCE</span>
        <div class="balance-display">
          <span class="coin-icon-lg">🪙</span>
          <span class="balance-amount" id="shop-balance">0</span>
        </div>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="shop-tabs" id="shop-tabs">
      <button class="shop-tab active" data-tab="powerups">⚡ POWERUPS</button>
      <button class="shop-tab" data-tab="upgrades">🔧 UPGRADES</button>
      <button class="shop-tab" data-tab="consumables">💊 CONSUMABLES</button>
      <button class="shop-tab" data-tab="cosmetics">✨ COSMETICS</button>
    </nav>

    <!-- Shop grid area -->
    <div class="shop-body">
      <div class="shop-grid" id="shop-grid">
        <!-- Cards injected by JS -->
      </div>
      <div class="shop-empty hidden" id="shop-empty">
        <span class="empty-icon">🛒</span>
        <p>Nothing here yet — check back after more waves!</p>
      </div>
    </div>

    <!-- Cart / selection info -->
    <div class="shop-selection-bar" id="shop-selection-bar">
      <div class="sel-info" id="sel-info">
        <span id="sel-name">Select an item</span>
        <span id="sel-desc" class="sel-desc"></span>
      </div>
      <button class="btn btn-primary btn-buy" id="btn-buy" disabled>
        BUY — <span id="buy-cost">0</span> 🪙
      </button>
    </div>
  </div>

  <!-- Purchase feedback overlay -->
  <div class="purchase-splash hidden" id="purchase-splash">
    <div class="purchase-splash-inner">
      <div class="ps-icon" id="ps-icon">⚡</div>
      <div class="ps-name" id="ps-name">RAPID FIRE</div>
      <div class="ps-msg">PURCHASED!</div>
    </div>
  </div>

  <!-- Not enough coins overlay -->
  <div class="no-coins-overlay hidden" id="no-coins-overlay">
    <div class="no-coins-box">
      <span class="no-coins-icon">😢</span>
      <p>Not enough coins!</p>
      <p class="no-coins-sub">Destroy more asteroids to earn coins.</p>
      <button class="btn btn-ghost" id="btn-close-no-coins">OK</button>
    </div>
  </div>

  <script src="../js/utils/MathUtils.js"></script>
  <script src="../js/utils/RNG.js"></script>
  <script src="../js/utils/SaveManager.js"></script>
  <script>

    const RARITY_COLORS = {
      common:   { bg: '#1a2a1a', border: '#3dffa0', label: 'COMMON',   text: '#3dffa0' },
      uncommon: { bg: '#1a2030', border: '#38beff', label: 'UNCOMMON', text: '#38beff' },
      rare:     { bg: '#1a1a35', border: '#b87dff', label: 'RARE',     text: '#b87dff' },
      epic:     { bg: '#2a1520', border: '#ff4466', label: 'EPIC',     text: '#ff4466' },
    };

    class ShopPage {
      constructor() {
        this.save      = new SaveManager('planetDefender');
        this.rng       = new RNG();
        this.activeTab = 'powerups';
        this.selected  = null;
        this.bgCtx     = null;
        this.stars     = [];
        this.init();
      }

      init() {
        this.setupBgCanvas();
        this.buildStars(200);
        this.loadBalance();
        this.bindTabs();
        this.bindBack();
        this.renderTab('powerups');
        this.animateBg();
        this.bindPurchaseButton();
        this.bindMessage();
      }

      /* ── Save / balance ── */
      loadBalance() {
        const coins = this.save.getCoins();
        document.getElementById('shop-balance').textContent = coins.toLocaleString();
        return coins;
      }

      /* ── Tabs ── */
      bindTabs() {
        document.querySelectorAll('.shop-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            this.activeTab = tab.dataset.tab;
            this.selected  = null;
            this.updateSelectionBar();
            this.renderTab(this.activeTab);
          });
        });
      }

      /* ── Back button ── */
      bindBack() {
        document.getElementById('btn-back').addEventListener('click', () => {
          this.send('navigate', 'back');
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' || e.key === 'Backspace') {
            this.send('navigate', 'back');
          }
        });
      }

      bindMessage() {
        window.addEventListener('message', (e) => {
          // ScreenManager sends SAVE_SNAPSHOT after a purchase to refresh balance
          if (e.data && e.data.type === 'SAVE_SNAPSHOT') {
            const coins = (e.data.data && e.data.data.coins != null)
              ? e.data.data.coins
              : this.save.getCoins();
            const el = document.getElementById('shop-balance');
            if (el) el.textContent = coins.toLocaleString();
          }
        });
      }

      send(type, payload) {
        if (window.parent !== window) {
          window.parent.postMessage({ type, data: payload }, '*');
        }
      }

      /* ── Render grid ── */
      renderTab(tabKey) {
        const grid   = document.getElementById('shop-grid');
        const empty  = document.getElementById('shop-empty');
        const items  = SHOP_CATALOG[tabKey] || [];
        grid.innerHTML = '';
        if (!items.length) {
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');
        items.forEach(item => {
          const card = this.buildCard(item);
          grid.appendChild(card);
        });
      }

      buildCard(item) {
        const inv   = this.save.getInventory();
        const upgrades = this.save.getUpgrades();
        const coins = this.save.getCoins();
        const rar   = RARITY_COLORS[item.rarity] || RARITY_COLORS.common;

        let owned = 0;
        if (item.category === 'upgrades') {
          owned = upgrades[item.upgradeKey] || 0;
        } else {
          owned = inv[item.id] || 0;
        }

        const maxed    = (owned >= (item.maxLevel || item.maxStack));
        const canAfford = coins >= item.cost;
        const isSelected = this.selected && this.selected.id === item.id;

        const card = document.createElement('div');
        card.className = `shop-card rarity-${item.rarity}${isSelected ? ' selected' : ''}${maxed ? ' maxed' : ''}${!canAfford ? ' cant-afford' : ''}`;
        card.dataset.id = item.id;
        card.style.cssText = `
          --card-border: ${rar.border};
          --card-bg:     ${rar.bg};
        `;

        const stackInfo = item.category === 'upgrades'
          ? `<div class="card-level">LVL ${owned}/${item.maxLevel}</div>`
          : `<div class="card-stack">x${owned}/${item.maxStack}</div>`;

        card.innerHTML = `
          <div class="card-rarity-label" style="color:${rar.text}">${rar.label}</div>
          <div class="card-icon">${item.icon}</div>
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
          <div class="card-footer">
            <div class="card-cost ${!canAfford ? 'too-expensive' : ''}">
              🪙 ${item.cost.toLocaleString()}
            </div>
            ${stackInfo}
          </div>
          ${maxed ? '<div class="card-maxed-overlay">MAX</div>' : ''}
        `;

        card.addEventListener('click', () => {
          this.selectItem(item);
          document.querySelectorAll('.shop-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
        });

        return card;
      }

      selectItem(item) {
        this.selected = item;
        this.updateSelectionBar();
      }

      updateSelectionBar() {
        const nameEl = document.getElementById('sel-name');
        const descEl = document.getElementById('sel-desc');
        const buyBtn = document.getElementById('btn-buy');
        const costEl = document.getElementById('buy-cost');

        if (!this.selected) {
          nameEl.textContent = 'Select an item';
          descEl.textContent = '';
          buyBtn.disabled = true;
          costEl.textContent = '0';
          return;
        }

        const item  = this.selected;
        const coins = this.save.getCoins();
        const inv   = this.save.getInventory();
        const upgrades = this.save.getUpgrades();
        let owned = 0;
        if (item.category === 'upgrades') {
          owned = upgrades[item.upgradeKey] || 0;
        } else {
          owned = inv[item.id] || 0;
        }
        const maxed = owned >= (item.maxLevel || item.maxStack);

        nameEl.textContent = item.name;
        descEl.textContent = item.detail;
        costEl.textContent = item.cost.toLocaleString();
        buyBtn.disabled = maxed || coins < item.cost;
      }

      bindPurchaseButton() {
        document.getElementById('btn-buy').addEventListener('click', () => {
          if (!this.selected) return;
          this.attemptPurchase(this.selected);
        });
        document.getElementById('btn-close-no-coins').addEventListener('click', () => {
          document.getElementById('no-coins-overlay').classList.add('hidden');
        });
      }

      attemptPurchase(item) {
        const coins = this.save.getCoins();
        if (coins < item.cost) {
          document.getElementById('no-coins-overlay').classList.remove('hidden');
          return;
        }
        // Deduct coins
        this.save.spendCoins(item.cost);
        // Update inventory or upgrades
        if (item.category === 'upgrades') {
          const upgrades = this.save.getUpgrades();
          upgrades[item.upgradeKey] = (upgrades[item.upgradeKey] || 0) + 1;
          this.save.setUpgrades(upgrades);
        } else {
          const inv = this.save.getInventory();
          inv[item.id] = (inv[item.id] || 0) + 1;
          this.save.setInventory(inv);
        }
        // Notify parent
        this.send('PURCHASE', { itemId: item.id, category: item.category });
        // Show splash
        this.showPurchaseSplash(item);
        // Refresh UI
        this.loadBalance();
        this.renderTab(this.activeTab);
        this.selected = null;
        this.updateSelectionBar();
      }

      showPurchaseSplash(item) {
        const splash = document.getElementById('purchase-splash');
        document.getElementById('ps-icon').textContent = item.icon;
        document.getElementById('ps-name').textContent = item.name;
        splash.classList.remove('hidden');
        setTimeout(() => splash.classList.add('hidden'), 1400);
      }

      /* ── Background starfield ── */
      setupBgCanvas() {
        const cvs = document.getElementById('shop-bg-canvas');
        cvs.width  = window.innerWidth;
        cvs.height = window.innerHeight;
        this.bgCtx = cvs.getContext('2d');
        window.addEventListener('resize', () => {
          cvs.width  = window.innerWidth;
          cvs.height = window.innerHeight;
        });
      }

      buildStars(n) {
        this.stars = [];
        const w = window.innerWidth, h = window.innerHeight;
        for (let i = 0; i < n; i++) {
          this.stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: 0.4 + Math.random() * 1.4,
            alpha: 0.2 + Math.random() * 0.6,
            spd: 0.4 + Math.random(),
            phase: Math.random() * Math.PI * 2,
          });
        }
      }

      animateBg(t = 0) {
        const ctx = this.bgCtx;
        const w = ctx.canvas.width, h = ctx.canvas.height;
        ctx.clearRect(0, 0, w, h);
        for (const s of this.stars) {
          const a = s.alpha * (0.6 + 0.4 * Math.sin(t * 0.001 * s.spd + s.phase));
          ctx.globalAlpha = a;
          ctx.fillStyle = '#c8e4ff';
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(ts => this.animateBg(ts));
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      window._shopPage = new ShopPage();
    });
  </script>
</body>
</html>

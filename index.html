<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Planet Defender</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffd700'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/reset.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/canvas.css"/>
  <link rel="stylesheet" href="css/hud.css"/>
  <link rel="stylesheet" href="css/powerup-bar.css"/>
  <link rel="stylesheet" href="css/buttons.css"/>
  <link rel="stylesheet" href="css/notifications.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
      <div id="screen-flash"></div>
    </div>

    <!-- HUD Top Bar -->
    <header id="hud" class="hud hidden">
      <div class="hud-left">
        <div class="hud-stat">
          <span class="hud-label">SCORE</span>
          <span class="hud-value glow-cyan" id="hud-score">0</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-stat">
          <span class="hud-label">BEST</span>
          <span class="hud-value" id="hud-best">0</span>
        </div>
      </div>
      <div class="hud-center">
        <div class="health-block">
          <span class="hud-label">PLANET HEALTH</span>
          <div class="health-bar-outer" id="health-bar-outer">
            <div class="health-bar-fill" id="health-bar-fill"></div>
            <div class="health-bar-shine"></div>
          </div>
          <span class="health-text" id="health-text">100 / 100</span>
        </div>
      </div>
      <div class="hud-right">
        <div class="hud-stat coin-stat">
          <span class="coin-icon">🪙</span>
          <span class="hud-value glow-gold" id="hud-coins">0</span>
        </div>
        <div class="hud-divider"></div>
        <div class="wave-badge">
          <span class="wave-label">WAVE</span>
          
          <span class="waved-num" id="hud-wave">1</span>
        </div>
        
        <button class="hud-btn" id="hud-pause-btn" title="Pause [P]">⏸</button>
        <button class="hud-btn" id="hud-shop-btn" title="Shop [S]">🛒</button>
      </div>
    </header>

    <!-- Powerup Bar Bottom -->
    <footer id="powerup-bar" class="powerup-bar hidden">
      <div class="pu-slots" id="pu-slots"></div>
      <div class="pu-hint">KEYS 1–5 TO ACTIVATE</div>
    </footer>

    <!-- Floating labels layer -->
    <div id="floater-layer" aria-hidden="true"></div>
    <!-- Toast notifications -->
    <div id="toast-stack" aria-live="polite"></div>
  </div>

  <!-- Screen overlay and iframe for auxiliary pages (title, shop, settings, gameover, etc.) -->
  <div id="screen-overlay" class="screen-overlay" aria-hidden="true">
    <iframe id="screen-frame" sandbox="allow-scripts allow-same-origin allow-forms" frameborder="0"></iframe>
  </div>

  <!-- Utils -->
  <script src="js/utils/MathUtils.js"></script>
  <script src="js/utils/ColorUtils.js"></script>
  <script src="js/utils/RNG.js"></script>
  <script src="js/utils/Pool.js"></script>
  <script src="js/utils/EventBus.js"></script>
  <script src="js/utils/SaveManager.js"></script>
  <script src="js/utils/SoundManager.js"></script>
  <script src="js/utils/InputManager.js"></script>
  <script src="js/utils/Floater.js"></script>
  <script src="js/utils/PerformanceMonitor.js"></script>
  <!-- Engine -->
  <script src="js/engine/Renderer.js"></script>
  <script src="js/engine/ParticleSystem.js"></script>
  <script src="js/engine/BackgroundRenderer.js"></script>
  <script src="js/engine/CollisionSystem.js"></script>
  <script src="js/engine/GameLoop.js"></script>
  <!-- Game Objects -->
  <script src="js/game/Planet.js"></script>
  <script src="js/game/Laser.js"></script>
  <script src="js/game/LaserManager.js"></script>
  <script src="js/game/Asteroid.js"></script>
  <script src="js/game/AsteroidManager.js"></script>
  <script src="js/game/CoinDrop.js"></script>
  <script src="js/game/CoinDropManager.js"></script>
  <script src="js/game/HealthDrop.js"></script>
  <script src="js/game/HealthDropManager.js"></script>
  <script src="js/game/PowerupManager.js"></script>
  <script src="js/game/WaveManager.js"></script>
  <script src="js/game/ScoreManager.js"></script>
  <script src="js/game/AchievementsManager.js"></script>
  <script src="js/game/UpgradeManager.js"></script>
  <script src="js/game/GameState.js"></script>
  <!-- UI -->
  <script src="js/ui/HUD.js"></script>
  <script src="js/ui/PowerupBar.js"></script>
  <script src="js/ui/ToastManager.js"></script>
  <script src="js/ui/ScreenManager.js"></script>
  <!-- Core -->
  <script src="js/engine/Game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
